name: GitHub CI

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  job1-build:
    name: Build (Compile)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build project
        run: ./gradlew build -x test


  job2-test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: job1-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Run JUnit tests
        run: ./gradlew test


  job3-format:
    name: Check Formatting
    runs-on: ubuntu-latest
    needs: job2-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Check code formatting
        run: ./gradlew spotlessCheck